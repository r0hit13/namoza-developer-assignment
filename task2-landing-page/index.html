<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OrthoNow - Book Consultation</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #eef2ff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            max-width: 520px;
            width: 100%;
            padding: 35px;
            border-radius: 18px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
        }

        .logo {
            color: #2563eb;
            font-size: 28px;
            margin-bottom: 15px;
        }

        h1 {
            color: #1e3a8a;
            font-size: 46px;
            line-height: 1.15;
            margin-bottom: 18px;
        }

        .subtitle {
            color: #4b5563;
            font-size: 18px;
            margin-bottom: 15px;
        }

        .availability {
            color: #16a34a;
            font-weight: bold;
            margin-bottom: 25px;
        }

        .trust {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .trust span {
            font-size: 15px;
        }

        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 16px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            font-size: 16px;
        }

        input:focus {
            outline: none;
            border-color: #2563eb;
        }

        button {
            width: 100%;
            padding: 15px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #1d4ed8;
        }

        #message {
            margin-top: 20px;
            padding: 20px;
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-radius: 12px;
            color: #166534;
        }

        #message h2 {
            margin-bottom: 10px;
        }

        @media (max-width: 600px) {

            .container {
                padding: 25px;
            }

            h1 {
                font-size: 34px;
            }

            .trust {
                flex-direction: column;
                gap: 12px;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <!-- Hero Section -->
        <h2 class="logo">🏥 OrthoNow</h2>

        <h1>
            Get an Expert Orthopaedic Opinion
            for Knee & Back Pain
        </h1>

        <p class="subtitle">
            Trusted by 10,000+ patients across Bengaluru.
            Same-week appointments available at 9 OrthoNow clinics.
        </p>

        <p class="availability">
            ✓ Same-day appointments available in Bengaluru
        </p>

        <!-- Trust Elements -->
        <div class="trust">
            <span>⭐ 4.8 Rating</span>
            <span>🏥 9 Clinics</span>
            <span>👨‍⚕️ 10,000+ Patients</span>
        </div>

        <!-- Consultation Form -->
        <form id="consultationForm">

            <input
                type="text"
                id="name"
                placeholder="Enter your name"
                required>

            <input
                type="tel"
                id="phone"
                placeholder="Enter your phone number"
                required>

            <!-- Hidden clinic preference for CRM -->
            <input
                type="hidden"
                id="clinic"
                value="Bengaluru - Indiranagar">

            <button type="submit">
                Get My Expert Opinion
            </button>

        </form>

        <!-- Thank You Message -->
        <div id="message"></div>

    </div>

    <script>

        // Initialize GTM dataLayer
        window.dataLayer = window.dataLayer || [];

        const form = document.getElementById("consultationForm");

        form.addEventListener("submit", function (e) {

            e.preventDefault();

            const name =
                document.getElementById("name").value;

            const phone =
                document.getElementById("phone").value;

            const clinic =
                document.getElementById("clinic").value;

            // GTM Event
            window.dataLayer.push({
                event: "consultation_form_submitted",
                user_name: name,
                phone_number: phone,
                clinic_preference: clinic,
                source: "Google Ads - Consultation Landing Page",
                city: "Bengaluru"
            });

            // Console output for Loom demo
            console.log("DataLayer Event Fired:");
            console.log(window.dataLayer);

            // Hide form and trust elements
            form.style.display = "none";
            document.querySelector(".trust").style.display = "none";
            document.querySelector(".availability").style.display = "none";

            // Show thank you state
            document.getElementById("message").innerHTML =
                `
                <h2>✅ Thank You!</h2>
                <p>
                    Our team will contact you within 30 minutes
                    to schedule your consultation.
                </p>
                `;

        });

    </script>

</body>

</html>
